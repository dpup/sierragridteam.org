# Signal Desk — the automated, member-reviewed news desk for /blog.
# Daily: a writer agent researches and (rarely) drafts a post per
# docs/news-feed-content-brief.md; a critic agent adversarially reviews and edits
# or vetoes it; anything that survives is opened as a PULL REQUEST for member
# review — the desk never publishes directly (the colophon promises human review).
# Runbook: docs/architecture/news-desk.md. Requires the CLAUDE_CODE_OAUTH_TOKEN secret.
name: News Desk

on:
  schedule:
    - cron: '12 21 * * *' # daily, 21:12 UTC ≈ 14:12 Pacific (afternoon; the Fire Desk has the morning)
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional: a suggested topic/angle to steer the writer's research (blank = normal run)"
        type: string
        default: ''
      force_post:
        description: 'Require a post this run: bypass the cadence guard and instruct the writer to publish (hard rules still apply)'
        type: boolean
        default: false
      force:
        description: 'Bypass ALL guards incl. the major-fire pause (testing only — the writer still applies the brief)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

# Models are pinned so runs are reproducible and quality is intentional — not whatever
# the CLI default happens to be on a given day. Writer and critic run on DIFFERENT models
# ON PURPOSE: a critic that shares the writer's blind spots catches fewer of its errors
# (a hallucinated spec, a laundered claim). Accuracy is trust-critical and volume is tiny,
# so this pipeline buys capability, not cost. Tune here; keep them different.
env:
  WRITER_MODEL: claude-opus-4-8
  CRITIC_MODEL: claude-sonnet-4-6

concurrency:
  group: news-desk
  cancel-in-progress: false

jobs:
  desk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Cheap mechanical guards before any API spend: pause during a MAJOR fire, then
      # enforce the brief's >=3-days-between-posts rule (max one per week — writer's judgment).
      - name: Guards — major-fire pause, then cadence
        id: guard
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Forced run — bypassing all guards (the writer still applies the brief)."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pause regular posts during a major fire: an active evacuation ORDER in the
          # service area. The Fire Desk covers the fire; a cheerful tech post now reads as
          # tone-deaf. (Minor fires — no order — do not pause; the desk just never writes
          # ABOUT the fire, per brief §3.) Honored even for a forced post — the tone-deafness
          # is the point; use `force` to override this pause too.
          orders=$(curl -sS -m 20 "https://data.sierragridteam.org/api/v1/hazards/ebbetts-pass/evacuation.geojson" \
            | jq '[.features[]? | select(((.properties.evacuation.level // "") | ascii_upcase) == "ORDER")] | length' 2>/dev/null || echo 0)
          if [ "${orders:-0}" != "0" ]; then
            echo "Active evacuation order in the service area — pausing regular posts (use 'force' to override)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # A forced post bypasses the cadence guard below (only) — the writer is told to publish.
          if [ "${{ inputs.force_post }}" = "true" ]; then
            echo "Forced post — bypassing the cadence guard; the writer is instructed to publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # 3-day cadence, measured against the newest NON-fire post: a live "Fire Update"
          # bulletin (which updates daily) must not trip the guard and suppress tech posts.
          latest=""
          for f in $(ls src/content/blog/*.md 2>/dev/null | sort -r); do
            grep -qE '^tag:[[:space:]]*Fire Update[[:space:]]*$' "$f" && continue
            latest=$(basename "$f" | cut -c1-10)
            break
          done
          if [ -n "$latest" ]; then
            age_days=$(( ( $(date -u +%s) - $(date -u -d "$latest" +%s) ) / 86400 ))
            echo "Most recent non-fire post: $latest (${age_days}d ago)"
            if [ "$age_days" -lt 3 ]; then
              echo "Under the 3-day minimum between posts — skipping this run."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip == 'false'
        with:
          node-version: 22
          cache: npm

      - uses: oven-sh/setup-bun@v2
        if: steps.guard.outputs.skip == 'false'
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: |
          npm ci --no-audit --no-fund
          npm install -g @anthropic-ai/claude-code
          mkdir -p /tmp/news-desk

      # Runtime context appended to the writer's brief: any operator-suggested topic, the
      # forced-post directive, and — crucially — the list of topics already declined
      # (closed, unmerged news-desk PRs), so the desk stops re-proposing rejected ideas.
      - name: Gather editorial context (declined topics + run inputs)
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPIC: ${{ inputs.topic }}
          FORCE_POST: ${{ inputs.force_post }}
        run: |
          {
            echo "## This run's context"
            echo
            echo "_Appended to your brief at runtime. It never overrides the brief's hard rules._"
            echo
            if [ -n "$TOPIC" ]; then
              echo "### Suggested topic (from the operator)"
              printf '%s\n\n' "$TOPIC"
              echo "Prioritise this angle in your research. If it cannot be done honestly under the brief (an unfolding incident as the subject, a claim you cannot source, the §10.4 comparison rule, any hard rule), do not force it — pick the strongest defensible topic instead and explain the swap in your notes."
              echo
            fi
            if [ "$FORCE_POST" = "true" ]; then
              echo "### Forced post"
              echo "The operator has requested a post THIS run, so the usual cadence/pacing and \"silence is a valid outcome\" guidance is set aside — produce one publishable draft. Every hard rule still binds. Decline ONLY if nothing can clear the hard rules honestly; if so, write DECISION: NO POST naming the specific rule that blocked it."
              echo
            fi
            echo "### Previously declined — already considered and rejected"
            echo "These drafts were opened and then closed without merging. Treat them as covered ground: do not re-propose the same topic unless you have a materially new, sourced angle that answers why it was set aside before."
            echo
            gh pr list --repo "$GITHUB_REPOSITORY" --state closed --limit 60 \
              --json title,mergedAt,headRefName \
              --jq '.[] | select(.mergedAt == null and (.headRefName | startswith("news-desk/"))) | "- \(.title)"' \
              2>/dev/null || echo "- (lookup unavailable this run)"
          } > /tmp/news-desk/run-context.md
          echo "--- run context ---"
          cat /tmp/news-desk/run-context.md

      - name: Writer — research and draft (or decline)
        if: steps.guard.outputs.skip == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo "Writer model: $WRITER_MODEL"
          claude --model "$WRITER_MODEL" --dangerously-skip-permissions --max-turns 80 \
            -p "$(cat .github/prompts/news-desk-writer.md; echo; cat /tmp/news-desk/run-context.md)"
          echo "--- writer notes ---"
          cat /tmp/news-desk/writer-notes.md || echo "(no writer notes written)"

      - name: Detect draft
        if: steps.guard.outputs.skip == 'false'
        id: draft
        run: |
          post=$(git status --porcelain src/content/blog/ | awk '$1=="??" {print $2}' | head -1)
          if [ -z "$post" ]; then
            echo "No draft this run — the desk declined to publish (a successful outcome)."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "Draft: $post"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "post=$post" >> "$GITHUB_OUTPUT"
          fi

      - name: Critic — adversarial review and edit (or veto)
        if: steps.guard.outputs.skip == 'false' && steps.draft.outputs.exists == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo "Critic model: $CRITIC_MODEL (different from the writer on purpose)"
          claude --model "$CRITIC_MODEL" --dangerously-skip-permissions --max-turns 50 \
            -p "$(cat .github/prompts/news-desk-critic.md)"
          echo "--- critic notes ---"
          cat /tmp/news-desk/critic-notes.md || echo "(no critic notes written)"

      - name: Re-detect after review (the critic may veto by deleting)
        if: steps.guard.outputs.skip == 'false' && steps.draft.outputs.exists == 'true'
        id: final
        run: |
          post=$(git status --porcelain src/content/blog/ | awk '$1=="??" {print $2}' | head -1)
          if [ -z "$post" ]; then
            echo "Critic vetoed the draft — nothing to publish."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "post=$post" >> "$GITHUB_OUTPUT"
          fi

      # Belt-and-suspenders: both agents were told to run these, but the PR only
      # opens if the tree actually verifies and builds.
      - name: Verify and build
        if: steps.guard.outputs.skip == 'false' && steps.final.outputs.exists == 'true'
        run: |
          make verify
          npm run build

      - name: Open pull request for member review
        if: steps.guard.outputs.skip == 'false' && steps.final.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POST: ${{ steps.final.outputs.post }}
        run: |
          slug=$(basename "$POST" .md)
          title=$(awk -F': *' '$1=="title" {sub(/^title: */,""); print; exit}' "$POST")
          branch="news-desk/$slug"
          git config user.name "sierra-news-desk[bot]"
          git config user.email "news-desk@users.noreply.github.com"
          git checkout -b "$branch"
          git add "$POST"
          git commit -m "post: $title" -m "Drafted and reviewed by the Signal Desk (automated). See PR for notes."
          git push origin "$branch"
          {
            echo "Automated draft from the **Signal Desk** — review per docs/news-feed-content-brief.md before merging. Merging publishes it."
            echo
            echo "_Written by \`$WRITER_MODEL\` · reviewed by \`$CRITIC_MODEL\`._"
            echo
            echo "## Writer notes"
            cat /tmp/news-desk/writer-notes.md 2>/dev/null || echo "(none)"
            echo
            echo "## Critic notes"
            cat /tmp/news-desk/critic-notes.md 2>/dev/null || echo "(none)"
            echo
            echo "## Reviewer checklist"
            echo "- [ ] Every claim's source link holds up"
            echo "- [ ] Nothing about an unfolding incident; no emergency instructions"
            echo "- [ ] No claims about S.I.E.R.R.A's own network/operations"
            echo "- [ ] Voice reads like the site (calm, plain, no hype)"
          } > /tmp/news-desk/pr-body.md
          gh pr create --title "News desk: $title" --body-file /tmp/news-desk/pr-body.md --reviewer dpup
