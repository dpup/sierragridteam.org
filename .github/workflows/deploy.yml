name: Deploy

# Auto-deploys the static build to AWS S3 + CloudFront after CI passes on main
# (i.e. on merge). Infra — bucket, distribution, OAC, ACM cert, DNS — is
# provisioned separately (Terraform). No secrets are committed.
#
# Configure under Settings → Secrets and variables → Actions
# (matches the dpup/ersn.net convention: only the keys are secret):
#   Secrets:    AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   Variables:  AWS_REGION         e.g. us-west-2
#               AWS_ACCOUNT_ID     expected account (deploy aborts if it differs)
#               S3_BUCKET_NAME     target bucket
#               CF_DISTRO_ID       CloudFront distribution to invalidate

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    # Deploy on a manual run, or automatically once CI succeeds on main (merge).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://sierragridteam.org
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --no-audit --no-fund
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify target AWS account
        run: |
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACCT" != "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "::error::Authenticated account $ACCT does not match expected ${{ vars.AWS_ACCOUNT_ID }} — aborting."
            exit 1
          fi
          echo "Deploying to AWS account $ACCT"

      # Hashed, fingerprinted assets → cache forever (immutable).
      - name: Sync immutable assets
        run: |
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET_NAME }}" \
            --delete \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --exclude "*.json" \
            --cache-control "public, max-age=31536000, immutable"

      # HTML + manifests → always revalidate.
      - name: Sync HTML & manifests
        run: |
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET_NAME }}" \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.txt" \
            --include "*.json" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CF_DISTRO_ID }}" \
            --paths "/*"
