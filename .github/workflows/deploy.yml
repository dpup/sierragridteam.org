name: Deploy

# Deploys the static build to AWS S3 + CloudFront (DNS managed via Hostinger).
# TEMPLATE: set the repo secrets/variables below before enabling. No secrets are
# committed. See docs/deployment.md.
#
# Required (Settings → Secrets and variables → Actions):
#   secrets.AWS_ROLE_ARN              IAM role for GitHub OIDC (recommended), OR
#   secrets.AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY  (fallback)
#   vars.AWS_REGION                   e.g. us-west-2
#   vars.S3_BUCKET                    target bucket name
#   vars.CLOUDFRONT_DISTRIBUTION_ID   distribution to invalidate

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

permissions:
  id-token: write # for AWS OIDC
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    # Only deploy when CI passed (or when manually dispatched).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://sierragridteam.org
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --no-audit --no-fund
      - run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Hashed, fingerprinted assets → cache forever (immutable).
      - name: Sync immutable assets
        run: |
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET }}" \
            --delete \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --exclude "*.json" \
            --cache-control "public, max-age=31536000, immutable"

      # HTML + manifests → always revalidate.
      - name: Sync HTML & manifests
        run: |
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET }}" \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.txt" \
            --include "*.json" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
